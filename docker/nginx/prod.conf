# TLS는 앞단(LB/Cloudflare)에서 종단 → 원본 스킴은 X-Forwarded-Proto로 전달됨.
# LB 헤더가 있으면 그대로, 없으면(직접 접근) 현재 스킴으로 폴백.
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server_tokens off;   # 응답에서 nginx 버전 숨김

# 응답 압축 (전송 계층) — 텍스트 자산만. 바이너리/이미 압축된 콘텐츠는 제외.
gzip on;
gzip_static on;        # 빌드 시 만든 .gz 우선 서빙 (런타임 압축 CPU 0)
gzip_vary on;          # 캐시가 압축/비압축 응답을 구분(Vary: Accept-Encoding)
gzip_proxied any;      # 프록시(/api JSON) 응답도 압축
gzip_comp_level 5;     # 동적 압축 레벨(정적은 빌드 시 -9로 이미 최적)
gzip_min_length 1024;  # 1KB 미만은 압축 안 함(오버헤드 회피)
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

server {
    listen 8080;   # TLS 종단은 앞단 LB. 이 컨테이너는 평문 HTTP만 수신.
    server_name _;

    # 업로드 한도 — Spring multipart 한도와 일치시킬 것
    client_max_body_size 100M;

    # 보안 헤더 (always: 에러 응답에도 적용). 하위 location에 add_header가 없어 그대로 상속됨.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: 기본 self 고정. 폰트(Pretendard)는 cdn.jsdelivr.net 허용, 인라인 스타일은 React/Tailwind용 허용.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

    # 빌드된 React 정적 자산 서빙
    root /usr/share/nginx/html;
    index index.html;

    # 해시 파일명 정적 자산: 장기 캐시(1년). expires는 add_header가 아니라 보안헤더 상속 유지.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico)$ {
        expires 1y;
        try_files $uri =404;
    }

    location / {
        expires -1;                          # HTML/SPA는 항상 재검증(Cache-Control: no-cache) → 새 배포 즉시 반영
        try_files $uri $uri/ /index.html;    # SPA 라우팅 fallback
    }

    # API 프록시 — 같은 compose 네트워크의 api 서비스
    location /api {
        # Docker 내장 DNS로 'api'를 매 요청 재해석(변수 proxy_pass).
        # api 컨테이너 재시작으로 IP가 바뀌어도 stale-IP 502 없이 따라감.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
    }
}
